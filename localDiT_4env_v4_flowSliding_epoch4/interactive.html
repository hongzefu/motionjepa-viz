    }, { displaylogo: false, responsive: true });

    // Attach hover handler (reset after each render)
    const plot = document.getElementById("plotDiv");
    plot.on("plotly_hover", (ev) => {
      if (!ev.points || !ev.points.length) return;
      const idx = ev.points[0].customdata;  // global chunk index
      const clip = DATA.labels.clip[idx];
      const prev = clipVid.getAttribute("data-idx");
      if (prev != idx) {
        clipVid.setAttribute("data-idx", idx);
        if (clip) {
          clipVid.src = clip;
          clipVid.play().catch(() => {});
        } else {
          clipVid.removeAttribute("src");
          clipVid.load();
        }
      }
      const padded = DATA.labels.padded && DATA.labels.padded[idx];
      const nReal = DATA.labels.n_real_frames && DATA.labels.n_real_frames[idx];
      const padNote = padded
        ? ` <span style="color:#e6a23c;">(PAD: ${nReal} real frames)</span>`
        : "";
      metaDiv.innerHTML =
        `<b>task</b>        ${DATA.labels.task[idx]}<br>` +
        `<b>episode</b>     ${DATA.labels.episode[idx]}<br>` +
        `<b>variant</b>     ${DATA.labels.variant[idx]}<br>` +
        `<b>chunk_idx</b>   ${DATA.labels.chunk_idx[idx]}${padNote}<br>` +
        `<b>start_frame</b> ${DATA.labels.start_frame[idx]}<br>` +
        `<b>clip</b>        ${clip || "(not extracted)"}`;
    });
  }

  projSel.addEventListener("change", render);
  colorSel.addEventListener("change", render);
  // Initial render after selects are populated
  projSel.value = Object.keys(DATA.projections)[0];
  render();
})();
</script>
</body>
</html>
