/* ==================================================== */

(function () {
  const projSel = document.getElementById("projSel");
  const colorSel = document.getElementById("colorSel");
  const clipVid = document.getElementById("clipVid");
  const metaDiv = document.getElementById("metaDiv");

  // Populate projection dropdown
  for (const k of Object.keys(DATA.projections)) {
    const opt = document.createElement("option");
    opt.value = k; opt.textContent = k;
    projSel.appendChild(opt);
  }

  // Populate color-by dropdown (data-driven: base + 任意标签列如 action/event)
  const colorOptions = DATA.color_options || ["task", "episode", "variant"];
  for (const k of colorOptions) {
    const opt = document.createElement("option");
    opt.value = k; opt.textContent = k;
    colorSel.appendChild(opt);
  }

  const palette = [
    "#1f77b4","#ff7f0e","#2ca02c","#d62728","#9467bd","#8c564b","#e377c2","#7f7f7f","#bcbd22","#17becf",
    "#aec7e8","#ffbb78","#98df8a","#ff9896","#c5b0d5","#c49c94","#f7b6d2","#c7c7c7","#dbdb8d","#9edae5",
  ];

  function uniqueValues(arr) {
    const s = new Set(arr);
    return Array.from(s).sort();
  }

  function buildTraces(projKey, colorKey) {
    const xy = DATA.projections[projKey];
    const cats = DATA.labels[colorKey];
    const groups = uniqueValues(cats);
    const traces = [];
    groups.forEach((g, gi) => {
      const idx = [];
      for (let i = 0; i < cats.length; i++) {
        if (cats[i] === g) idx.push(i);
      }
      traces.push({
        type: "scattergl", mode: "markers", name: String(g),
        x: idx.map(i => xy[i][0]),
        y: idx.map(i => xy[i][1]),
        customdata: idx,  // global chunk index per point
        marker: { color: palette[gi % palette.length], size: 6, opacity: 0.8 },
        hoverinfo: "text",
        hovertext: idx.map(i =>
          `${DATA.labels.task[i]} · ${DATA.labels.episode[i]} · ${DATA.labels.variant[i]}<br>` +
          `chunk ${DATA.labels.chunk_idx[i]} @ frame ${DATA.labels.start_frame[i]}` +
          (DATA.labels.grip ? `<br>grip: ${DATA.labels.grip[i]}` : "") +
          (DATA.labels.move ? ` · move: ${DATA.labels.move[i]}` : "") +
          (DATA.labels.event ? ` · event: ${DATA.labels.event[i]}` : "")
        ),
      });
    });
    return traces;
  }

  function render() {
    const projKey = projSel.value;
    const colorKey = colorSel.value;
    const traces = buildTraces(projKey, colorKey);
    Plotly.react("plotDiv", traces, {
      paper_bgcolor: "#0f1116",
      plot_bgcolor: "#0f1116",
      font: { color: "#e4e7ee" },
      xaxis: { showgrid: false, zeroline: false, showticklabels: false, title: projKey + " 1" },
      yaxis: { showgrid: false, zeroline: false, showticklabels: false, title: projKey + " 2" },
      legend: { font: { size: 10 }, itemsizing: "constant" },
      margin: { l: 40, r: 20, t: 20, b: 40 },
      hovermode: "closest",
    }, { displaylogo: false, responsive: true });

    // Attach hover handler (reset after each render)
    const plot = document.getElementById("plotDiv");
    plot.on("plotly_hover", (ev) => {
      if (!ev.points || !ev.points.length) return;
      const idx = ev.points[0].customdata;  // global chunk index
      const clip = DATA.labels.clip[idx];
      const prev = clipVid.getAttribute("data-idx");
      if (prev != idx) {
        clipVid.setAttribute("data-idx", idx);
        if (clip) {
          clipVid.src = clip;
          clipVid.play().catch(() => {});
        } else {
          clipVid.removeAttribute("src");
          clipVid.load();
        }
      }
      const padded = DATA.labels.padded && DATA.labels.padded[idx];
      const nReal = DATA.labels.n_real_frames && DATA.labels.n_real_frames[idx];
      const padNote = padded
        ? ` <span style="color:#e6a23c;">(PAD: ${nReal} real frames)</span>`
        : "";
      metaDiv.innerHTML =
        `<b>task</b>        ${DATA.labels.task[idx]}<br>` +
        `<b>episode</b>     ${DATA.labels.episode[idx]}<br>` +
        `<b>variant</b>     ${DATA.labels.variant[idx]}<br>` +
        `<b>chunk_idx</b>   ${DATA.labels.chunk_idx[idx]}${padNote}<br>` +
        `<b>start_frame</b> ${DATA.labels.start_frame[idx]}<br>` +
        (DATA.labels.grip ? `<b>grip</b>        ${DATA.labels.grip[idx]}<br>` : "") +
        (DATA.labels.move ? `<b>move</b>        ${DATA.labels.move[idx]}<br>` : "") +
        (DATA.labels.event ? `<b>event</b>       ${DATA.labels.event[idx]}<br>` : "") +
        `<b>clip</b>        ${clip || "(not extracted)"}`;
    });
  }

  projSel.addEventListener("change", render);
  colorSel.addEventListener("change", render);
  // Initial render after selects are populated
  projSel.value = Object.keys(DATA.projections)[0];
  render();
})();
